name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: python -m pip install --upgrade flake8

      - name: flake8
        run: flake8 --show-source --statistics

      - name: Compile-check Python
        run: python -m compileall -q control scenarios lib config/ubuntu

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # SC2054 is excluded: our QEMU arg arrays contain option tokens with
        # intentional internal commas (e.g. `-machine q35,smm=on`), which the
        # check misreads as array-element separators.
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning -e SC2054 *.sh lib/*.sh
